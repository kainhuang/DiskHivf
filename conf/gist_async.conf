train_data_file = ./data/gist/gist_learn.dim.fvecs
index_data_file = ./data/gist/gist_base.dim.fvecs
model_file = ./output/gist_model2
index_dir = ./output/gist_index2
index_file_num = 5
dim = 960
kmeans_epoch = 20
kmeans_sample_rete = 1
batch_size = 64
kmeans_centers_select_type = 3
first_cluster_num = 800
second_cluster_num = 125
hierachical_cluster_epoch = 5
read_file_batch_size = 128
build_index_search_first_center_num = 200
search_first_center_num = 100
search_second_center_num = 4900
is_disk = 1
search_neighbors = 120000
search_block_num = 40000
search_top_cut = 7
hs_mode = 0
thread_num = 32
read_index_file_thread_num = 4
build_index_num = -1
train_data_num = -1
use_uint8_data = 0
# === 异步IO核心开关 ===
is_async_read = 1                # 启用异步读取模式（1=启用，0=同步）
io_thread_num = 4                # IO线程池线程数（gist数据集较小，4线程足够）
# === 缓存（未完成，保持关闭） ===
use_cache = 0
cache_capacity = 0
cache_segment = 0
# === 动态剪枝 ===
dynamic_prune_switch = 0
dynamic_prune_a = 16.8
dynamic_prune_b = 128.4
dynamic_prune_c = 2.1
build_search_topk = 5
build_search_first_center_id_diff = 10
# === 异步IO优化新增参数 ===
use_pread = 1                    # 使用pread替代fstream读取，消除全局锁竞争（1=启用，0=回退到fstream+锁）
use_direct_io = 0                # 是否使用O_DIRECT模式（1=启用，0=普通缓存IO；gist数据集较小建议关闭）
prefetch_bytes_limit = 262144    # [DEPRECATED] 异步模式已改为全量预提交，此参数不再使用
block_split_threshold = 131072   # 大block拆分阈值（128KB，gist数据量较小适当降低阈值以提升负载均衡）
min_sub_task_size = 32768        # 拆分后子任务最小大小（32KB，避免过细拆分增加调度开销）
